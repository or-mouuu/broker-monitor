name: 每日券商分點大額買進監控

on:
  schedule:
    # 台灣時間約 19:30（UTC 09:30，提前2小時預留 GitHub delay），週一至週五
    - cron: "30 9 * * 1-5"
  workflow_dispatch:   # 允許手動觸發

permissions:
  contents: write

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest

    steps:
      # ── 1. 取得程式碼（帶歷史資料）──────────────────────────
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. 設定 Python ─────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      # ── 3. 確認工具（curl + iconv 已內建 ubuntu-latest）─────
      - name: Verify tools
        run: |
          curl --version | head -1
          iconv --version | head -1

      # ── 4. 執行監控腳本（產生 index.html + data/ + 寄信）────
      - name: Run broker monitor
        env:
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          EMAIL_SENDER:    ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:  ${{ secrets.EMAIL_PASSWORD }}
        run: |
          python3 broker_monitor.py --email
          echo "--- 產生檔案大小 ---"
          wc -c index.html
          ls -la data/ 2>/dev/null || echo "(data/ 目錄不存在)"

      # ── 5. 提交 index.html + data/ 快照至 main 分支 ─────────
      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git add data/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "自動更新：$(date -u +'%Y/%m/%d %H:%M UTC')"
          git push
